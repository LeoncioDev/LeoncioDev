<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="900" height="280">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container {
          width: 900px;
          height: 280px;
          background: #0d1117;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 60px;
          position: relative;
          overflow: hidden;
          font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* Grade de pontos sutil no fundo */
        .container::before {
          content: '';
          position: absolute;
          inset: 0;
          background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
          background-size: 28px 28px;
          z-index: 0;
        }

        /* Glow ciano no canto superior direito */
        .container::after {
          content: '';
          position: absolute;
          top: -80px;
          right: -80px;
          width: 400px;
          height: 400px;
          background: radial-gradient(circle, rgba(34,211,238,0.08) 0%, transparent 65%);
          z-index: 0;
        }

        .content {
          position: relative;
          z-index: 1;
        }

        .tag {
          display: inline-flex;
          align-items: center;
          gap: 7px;
          font-size: 11px;
          font-weight: 500;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: #22D3EE;
          margin-bottom: 18px;
        }

        .tag-dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #22D3EE;
          animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.3; }
        }

        .name {
          font-size: 52px;
          font-weight: 800;
          color: #f0f6fc;
          letter-spacing: -2px;
          line-height: 1;
          margin-bottom: 14px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .role {
          font-size: 16px;
          color: #8d96a0;
          letter-spacing: 0.02em;
          font-weight: 400;
          font-family: 'JetBrains Mono', monospace;
        }

        .role span {
          color: #22D3EE;
          font-weight: 600;
        }

        /* Linha decorativa vertical à esquerda */
        .line {
          position: absolute;
          left: 40px;
          top: 40px;
          bottom: 40px;
          width: 2px;
          background: linear-gradient(to bottom, transparent, #22D3EE, transparent);
          z-index: 1;
        }

        /* Coordenadas no canto inferior direito */
        .coords {
          position: absolute;
          bottom: 24px;
          right: 60px;
          font-size: 10px;
          color: #2d333b;
          letter-spacing: 0.1em;
          font-family: 'JetBrains Mono', monospace;
          z-index: 1;
        }
      </style>

      <div class="container">
        <div class="line"></div>
        <div class="content">
          <div class="tag">
            <div class="tag-dot"></div>
            Full Stack Developer · Maceió, Brazil
          </div>
          <div class="name">João Paulo<br/>Leôncio</div>
          <div class="role">
            Building things for the <span>web.</span>
            Node.js · React · JavaScript
          </div>
        </div>
        <div class="coords">leonciodev.me · github.com/LeoncioDev</div>
      </div>
    </div>
  </foreignObject>
</svg>
